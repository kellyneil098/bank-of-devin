# Devin Coverage Dashboard — coverage pipeline (spec §4).
#
# Measures test coverage and records an immutable snapshot on the orphan
# `coverage-data` branch ("git as the database"). Three entry points:
#   * pull_request closed + merged  -> per-merge snapshot, exact attribution
#   * schedule (daily)              -> backstop daily snapshot, pr_number null
#   * workflow_dispatch             -> manual run
#
# Loop safety: this workflow only ever writes to the `coverage-data` branch,
# which no trigger here watches; commits also carry a `[skip ci]` marker.
name: coverage-pipeline

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: coverage-data
  cancel-in-progress: false

jobs:
  measure:
    # Per-merge runs are guarded on merged == true; daily/manual runs always go.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve target snapshot
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
            echo "trigger=merge" >> "$GITHUB_OUTPUT"
            echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "trigger=daily" >> "$GITHUB_OUTPUT"
            echo "pr=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: coverage-dashboard/package-lock.json

      # Coverage is best-effort per service: one failing module must not block
      # the snapshot. The dashboard reports whatever reports were produced.
      - name: Measure Java coverage (JaCoCo)
        continue-on-error: true
        run: |
          for svc in src/ledger/ledgerwriter src/ledger/balancereader src/ledger/transactionhistory; do
            if [ -f "$svc/pom.xml" ]; then
              (cd "$svc" && ../../../mvnw -B -ntp verify) \
                || echo "::warning::JaCoCo run failed for $svc"
            fi
          done

      - name: Measure Python coverage (coverage.py)
        continue-on-error: true
        run: |
          for svc in src/accounts/userservice src/accounts/contacts src/frontend; do
            if [ -f "$svc/requirements.txt" ]; then
              venv="/tmp/venv-$(basename "$svc")"
              python -m venv "$venv"
              # shellcheck disable=SC1090
              . "$venv/bin/activate"
              pip install --quiet -r "$svc/requirements.txt" pytest pytest-cov
              (cd "$svc" && python -m pytest --cov=. --cov-branch --cov-report=json:coverage.json) \
                || echo "::warning::pytest run failed for $svc"
              deactivate
            fi
          done

      # The coverage-data branch is the datastore. It is bootstrapped once by
      # `npm run pipeline:seed`; this checkout expects it to already exist.
      - name: Check out coverage-data branch
        uses: actions/checkout@v4
        with:
          ref: coverage-data
          path: coverage-data
          fetch-depth: 0

      - name: Ensure data layout
        run: |
          mkdir -p coverage-data/data/snapshots coverage-data/data/pulls
          if [ ! -f coverage-data/data/categories.json ]; then
            cp coverage-dashboard/public/data/categories.json coverage-data/data/categories.json
          fi

      - name: Install pipeline dependencies
        working-directory: coverage-dashboard
        run: npm ci

      - name: Generate snapshot
        working-directory: coverage-dashboard
        env:
          REPO_ROOT: ${{ github.workspace }}
          DATA_DIR: ${{ github.workspace }}/coverage-data/data
          TRIGGER: ${{ steps.target.outputs.trigger }}
          COMMIT_SHA: ${{ steps.target.outputs.sha }}
          PR_NUMBER: ${{ steps.target.outputs.pr }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run pipeline:snapshot

      - name: Commit snapshot (loop-safe)
        working-directory: coverage-data
        run: |
          git config user.name "devin-coverage-bot"
          git config user.email "devin-coverage-bot@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No coverage change to record."
            exit 0
          fi
          git commit -m "coverage: ${{ steps.target.outputs.trigger }} @ ${{ steps.target.outputs.sha }} [skip ci]"
          git push origin HEAD:coverage-data
