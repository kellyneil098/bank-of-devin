# Devin Coverage Dashboard — static site deploy (spec §3).
#
# Builds the Vite app and publishes the static bundle to the `gh-pages`
# branch, which GitHub Pages serves at https://<owner>.github.io/<repo>/.
# The site is a pure static asset with no always-on backend; "live refresh"
# fetches the coverage-data branch directly from raw.githubusercontent.com.
name: deploy-dashboard

on:
  push:
    branches: [main]
    paths:
      - "coverage-dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-dashboard
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: coverage-dashboard/package-lock.json

      - name: Install
        working-directory: coverage-dashboard
        run: npm ci

      - name: Build
        working-directory: coverage-dashboard
        env:
          # Project page is served under /<repo>/.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Publish to gh-pages
        run: |
          touch coverage-dashboard/dist/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git worktree add --detach /tmp/gh-pages
          cd /tmp/gh-pages
          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          cp -r "$GITHUB_WORKSPACE/coverage-dashboard/dist/." .
          git add -A
          git commit -m "deploy: ${{ github.sha }} [skip ci]"
          git push -f origin gh-pages
